<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calculadoras Portugal 2026{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
<base target="_self">
</head>
<body>
    <header>
        <nav>
            <h1><a href="/">Calculadoras Portugal <span>2026</span></a></h1>
            <ul>
                <li><a href="/salario">Salário</a></li>
                <li><a href="/credito">Crédito</a></li>
                <li><a href="/rescisao">Rescisão</a></li>
                <li><a href="/subsidio">Desemprego</a></li>
            </ul>
        </nav>
    </header>

    <main class="{% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 Calculadoras Portugal 2026</p>
        <p><a href="https://www.buymeacoffee.com/ondoreoku" target="_blank" style="color: var(--primary); font-weight: 600;">Apoia este projeto</a></p>
    </footer>

    <!-- Buy Me a Coffee Widget -->
    <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="ondoreoku" data-description="Apoia o desenvolvimento destas calculadoras" data-message="Esta calculadora ajudou-te?" data-color="#059669" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
</body>
</html>
